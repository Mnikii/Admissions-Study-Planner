name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant permission for gradlew
        run: chmod +x gradlew
      
      - name: Build project
        run: ./gradlew build

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
            name: build-result

            path: build/libs/*.jar

            retention-days: 7