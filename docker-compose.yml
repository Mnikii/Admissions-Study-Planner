services:
  db:
    image: postgres:17-alpine
    container_name: eduplan-db
    environment:
      POSTGRES_DB: eduplan
      POSTGRES_USER: eduplan
      POSTGRES_PASSWORD: eduplan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: eduplan-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/eduplan
      DB_USERNAME: eduplan
      DB_PASSWORD: eduplan
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: eduplan-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.1.0
    container_name: eduplan-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana-storage:
